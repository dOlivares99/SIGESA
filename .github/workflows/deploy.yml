name: Deploy SIGESA to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: dotnet publish API/API.csproj -c Release -o ./publish-api

      - name: Deploy API to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: sigesa-api-jt
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish-api

  build-and-deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish WEB
        run: dotnet publish WEB/WEB.csproj -c Release -o ./publish-web

      - name: Deploy WEB to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: sigesa-web-jt
          publish-profile: ${{ secrets.AZURE_WEB_PUBLISH_PROFILE }}
          package: ./publish-web
